# wta_redis — wta-agents 전용 Redis Streams 컨테이너
# Phase 0 초안 (2026-04-12 crafter). 실제 기동은 MAX/부서장 승인 후.
#
# 기동:
#   docker compose -f wta_redis_compose.draft.yml up -d
# 중지:
#   docker compose -f wta_redis_compose.draft.yml down
#
# wmes-redis(6379)와 완전 분리: 포트 6380, 볼륨 wta_redis_data, 컨테이너명 wta_redis
services:
  wta_redis:
    image: redis:7.2-alpine
    container_name: wta_redis
    ports:
      - "6380:6379"
    volumes:
      - wta_redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  wta_redis_data:
    name: wta_redis_data
